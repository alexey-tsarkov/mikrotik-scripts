name: Adlist generator

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      filter-url:
        required: true
        type: string
      address:
        type: string

jobs:
  adlist:
    runs-on: ubuntu-latest
    steps:
      - name: Download filter
        run: |
          wget \
            -qO filter.txt \
            "${{ inputs.filter-url }}"
      - name: Generate hosts
        run: |
          awk \
            '/^\|\|([0-9a-z]+([-\.][0-9a-z]+)+)\^$/ {print addr,substr($1,3,length($1)-3)}' \
            addr='${{ case(inputs.address == '::', '::', '0.0.0.0') }}' \
            filter.txt > '${{ inputs.name }}.txt' \
            && awk 'END {print "::notice::"NR" hosts added"}' '${{ inputs.name }}.txt'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: ${{ inputs.name }}.txt
