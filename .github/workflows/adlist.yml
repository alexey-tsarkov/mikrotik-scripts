name: Adlist generator

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      filter-url:
        required: true
        type: string
      address:
        type: string

jobs:
  adlist:
    runs-on: ubuntu-latest
    steps:
      - name: Generate hosts
        run: |
          wget -qO - '${{ inputs.filter-url }}' |\
          sed "s/\r//g" |\
          awk '/^\|\|([0-9a-z]+([-\.][0-9a-z]+)+)\^$/ {print substr($1,3,length($1)-3)}' |\
          uniq |\
          awk '{print "${{ case(inputs.address == '::', '::', '0.0.0.0') }}",$1}' |\
          tee '${{ inputs.name }}.txt' |\
          awk 'END {print "::notice::"NR" hosts added"}'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: ${{ inputs.name }}.txt
