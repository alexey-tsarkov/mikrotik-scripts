name: Adlist generator

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      filter-url:
        required: true
        type: string
      address:
        type: string

jobs:
  adlist:
    runs-on: ubuntu-latest
    steps:
      - name: Generate ${{ inputs.name }} hosts
        run: |
          wget -qO - "${{ inputs.filter-url }}" \
          | sed -nE 's/^\|\|([^*]+)\^\s*/${{ case(inputs.address == '::', '::', '0.0.0.0') }} \1/p' \
          > ${{ inputs.name }}.txt
      - name: Upload ${{ inputs.name }} hosts file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: ${{ inputs.name }}.txt
