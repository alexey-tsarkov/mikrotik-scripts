name: GitHub pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: AdGuard
      - uses: ./.github/workflows/adlist.yml
        with:
          name: adguard
          filter-url: https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_15_DnsFilter/filter.txt
      - name: EasyList
        uses: ../.github/workflows/adlist.yml
        with:
          name: easylist
          filter-url: https://easylist.to/easylist/easylist.txt
      - name: EasyPrivacy
        uses: ../.github/workflows/adlist.yml
        with:
          name: easyprivacy
          filter-url: https://easylist.to/easylist/easyprivacy.txt
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path:
