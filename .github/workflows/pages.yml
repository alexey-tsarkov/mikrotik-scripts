name: Adlist
run-name: ${{ github.actor }} is generating adlists

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Generate AdGuard hosts file
        run: |
          wget -qO - https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_15_DnsFilter/filter.txt | \
          sed -nE 's/^\|\|([^*]+)\^\s*/:: \1/p' > adguard.txt
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path:
